apiVersion: apps/v1
kind: Deployment
metadata:
  name: bracu-rag
  namespace: default
  labels:
    app: bracu-rag
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bracu-rag
    template:
      metadata:
        labels:
          app: bracu-rag
      spec:
        containers:
          - name: bracu-rag
            image: bracu-rag:latest
            ports:
              - containerPort: 8000

            env:
              - name: GEMINI_API_KEY
                valueFrom:
                  name: bracu-rag-secrets
                  key: GEMINI_API_KEY

          volumeMounts:
            - name: chromadb-storage
              mountpath: /app/chroma_db

          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"

        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10

        redinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 5

      volumes:
      - name: chromadb-storage
        persistentVolumeClaim:
          clainName: chromadb-pvc
